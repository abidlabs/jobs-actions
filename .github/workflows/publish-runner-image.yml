name: publish-runner-image

on:
  push:
    branches: [main]
    paths:
      - "runner/**"
      - ".github/workflows/publish-runner-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          echo "tags=ghcr.io/${{ github.repository_owner }}/jobs-actions-runner:latest,ghcr.io/${{ github.repository_owner }}/jobs-actions-runner:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          echo "tags=ghcr.io/${{ github.repository_owner }}/jobs-actions-runner-gpu:latest,ghcr.io/${{ github.repository_owner }}/jobs-actions-runner-gpu:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
